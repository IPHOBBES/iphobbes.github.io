<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools · iphobbes</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      background: #0f0f12;
      color: #e4e4e7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }
    .wrap {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 0.35rem;
      color: #e4e4e7;
    }
    .tagline {
      font-size: 0.95rem;
      color: #a1a1aa;
      margin: 0 0 2rem;
    }
    nav {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    a {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: #18181c;
      border: 1px solid #2a2a30;
      border-radius: 12px;
      color: #e4e4e7;
      text-decoration: none;
      font-weight: 600;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
    }
    a:hover {
      border-color: #22c55e;
      background: #1c1c20;
    }
    a .card-icon {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #0f0f12;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    a .card-icon img {
      width: 24px;
      height: 24px;
      display: block;
    }
    a .card-text {
      min-width: 0;
    }
    a span {
      display: block;
      font-size: 0.8125rem;
      font-weight: 400;
      color: #a1a1aa;
      margin-top: 0.2rem;
    }
    .footer {
      margin-top: 2.5rem;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.875rem;
      color: #a1a1aa;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>&gt;_ web apps</h1>
    <p class="tagline">&gt;_ utilities</p>
    <nav>
      <a href="https://iphobbes.github.io/unix-timestamp-converter/" target="_blank" rel="noopener noreferrer">
        <span class="card-icon">
          <img src="https://iphobbes.github.io/unix-timestamp-converter/favicon.svg" alt="" width="24" height="24">
        </span>
        <span class="card-text">
          Unix timestamp converter
          <span>Convert between Unix time and human-readable date & time</span>
        </span>
      </a>
      <a href="https://iphobbes.github.io/QR-Creator/" target="_blank" rel="noopener noreferrer">
        <span class="card-icon">
          <img src="https://iphobbes.github.io/QR-Creator/favicon.svg" alt="" width="24" height="24">
        </span>
        <span class="card-text">
          QR Creator
          <span>Styled QR codes with logo and caption · PNG, JPEG, SVG</span>
        </span>
      </a>
    </nav>
    <footer class="footer">&gt;_ inder</footer>
  </div>
</body>
</html>
